<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iftekhar LLC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      text-align: center;
      padding: 2rem 1rem;
    }

    .logo {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #c8a96e, #f0d89a, #c8a96e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      margin-top: 0.5rem;
      font-size: 1rem;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c8a96e, transparent);
      margin: 2rem auto;
    }

    .card-grid {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 1rem 4rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2rem 1.75rem;
      width: 220px;
      text-align: center;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: #c8a96e;
      transform: translateY(-4px);
    }

    .card-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }

    .card h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #e8e8e8;
      margin-bottom: 0.4rem;
    }

    .card p {
      font-size: 0.85rem;
      color: #666;
      line-height: 1.5;
    }

    footer {
      position: fixed;
      bottom: 1.25rem;
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Iftekhar LLC</div>
    <div class="tagline">Official Site</div>
  </header>

  <div class="divider"></div>

  <div class="card-grid">
    <div class="card">
      <div class="card-icon">&#128200;</div>
      <h3>Strategy</h3>
      <p>Building products and systems with purpose.</p>
    </div>
    <div class="card">
      <div class="card-icon">&#128187;</div>
      <h3>Technology</h3>
      <p>Engineering solutions from concept to deployment.</p>
    </div>
    <div class="card">
      <div class="card-icon">&#129309;</div>
      <h3>Partners</h3>
      <p>Collaborating with teams that move fast.</p>
    </div>
  </div>

  <footer>&copy; 2026 Iftekhar LLC &mdash; All rights reserved</footer>

</body>
</html>
